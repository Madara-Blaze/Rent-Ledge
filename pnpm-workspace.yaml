packages:
  - "packages/*"

# Skip the pre-run install check. esbuild's binary ships via the
# @esbuild/<platform> package, so a skipped postinstall is harmless.
verifyDepsBeforeRun: false

# Build-script decisions. pnpm requires every dependency with an install/build
# script to be explicitly approved or it fails the install in CI (Vercel).
# pnpm 11 reads this `allowBuilds` map; the older onlyBuiltDependencies /
# ignoredBuiltDependencies keys are kept for pnpm 10 build images.
allowBuilds:
  esbuild: true
  '@scarf/scarf': false

onlyBuiltDependencies:
  - esbuild

ignoredBuiltDependencies:
  - "@scarf/scarf"
